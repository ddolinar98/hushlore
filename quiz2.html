function getStep(s) {
  if (s === 0) return { type: 'splash' };
  if (s >= 1 && s <= 3) return SHARED[s - 1];
  var bi = s - 4;
  var arr = branchArr();
  if (bi >= 0 && bi < arr.length) return arr[bi];
  if (s === loadingStep()) return { type: 'loading' };
  if (s === emailStep())   return { type: 'email' };
  return null;
}

function goNext() {

}

function goBack() {
  if (step > 0) { step--; render(); }
}

function render() {

function animLd(idx, from, to, dur, cb) {
  var el = document.getElementById('ld-st-' + idx);
  var item = document.getElementById('ld-' + idx);
  if (!el) { if (cb) cb(); return; }
  if (item) item.classList.add('active');
  var t0 = Date.now();
  (function tick() {
    var p = Math.min(from + (to - from) * ((Date.now() - t0) / dur), to);
    el.textContent = Math.round(p) + '%';
    if (p < to) requestAnimationFrame(tick);
    else { el.textContent = to + '%'; if (cb) cb(); }
  })();
}

function doneLd(idx) {
  var el = document.getElementById('ld-st-' + idx);
  var item = document.getElementById('ld-' + idx);
  if (el) el.innerHTML = '<span style="color:#c03358">✓</span>';
  if (item) { item.classList.remove('active'); item.classList.add('done'); }
}

function swapTest(idx) {
  var t = TESTIMONIALS[idx % TESTIMONIALS.length];
  var b = document.getElementById('test-body');
  var a = document.getElementById('test-auth');
  if (b) b.textContent = '"' + t.text + '"';
  if (a) a.textContent = '— ' + t.author;
}

function showModal(idx, cb) {
  var m = MODALS[idx];
  var ov = document.createElement('div');
  ov.className = 'modal-ov';
  ov.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-tag">To move forward, specify</div>' +
      '<div class="modal-q">' + m.q + '</div>' +
      '<div class="modal-btns">' +
        '<button class="mbtn" onclick="dismissModal(this)">No</button>' +
        '<button class="mbtn yes" onclick="dismissModal(this)">Yes</button>' +
      '</div>' +
    '</div>';
  ov._cb = cb;
  document.body.appendChild(ov);
}

function dismissModal(btn) {
  var ov = btn.closest('.modal-ov');
  var cb = ov._cb;
  ov.remove();
  if (cb) cb();
}

function startLoading() {
  animLd(0, 0, 49, 1200, function() {
    showModal(0, function() {
      animLd(0, 49, 100, 700, function() {
        doneLd(0); swapTest(1);
        animLd(1, 0, 49, 1000, function() {
          showModal(1, function() {
            animLd(1, 49, 100, 700, function() {
              doneLd(1); swapTest(2);
              animLd(2, 0, 49, 1000, function() {
                showModal(2, function() {
                  animLd(2, 49, 100, 700, function() {
                    doneLd(2); swapTest(3);
                    animLd(3, 0, 49, 1000, function() {
                      showModal(3, function() {
                        animLd(3, 49, 100, 700, function() {
                          doneLd(3); loadingDone();
                        });
                      });
                    });
                  });
                });
              });
            });
          });
        });
      });
    });
  });
}

function loadingDone() {
